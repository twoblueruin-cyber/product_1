<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0d2e"/>
      <stop offset="100%" stop-color="#0d1a3a"/>
    </linearGradient>
    <linearGradient id="hg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e83d84"/>
      <stop offset="100%" stop-color="#9b1a4a"/>
    </linearGradient>
  </defs>
  <!-- Card background -->
  <rect width="32" height="32" rx="5" fill="url(#bg)"/>
  <!-- Gold border -->
  <rect x="0.8" y="0.8" width="30.4" height="30.4" rx="4.4" fill="none" stroke="#f5c842" stroke-width="1.2"/>
  <!-- Inner border -->
  <rect x="2.5" y="2.5" width="27" height="27" rx="3" fill="none" stroke="#f5c842" stroke-width="0.5" opacity="0.5"/>
  <!-- Pink aura -->
