  <!-- Heart shape -->
  <path d="M16 23.5 Q10 19.5 9.5 15.5 Q8.5 11 12 10.5 Q14 10.2 16 12.2 Q18 10.2 20 10.5 Q23.5 11 22.5 15.5 Q22 19.5 16 23.5Z" fill="url(#hg)"/>
  <!-- Heart glow -->
  <path d="M16 23.5 Q10 19.5 9.5 15.5 Q8.5 11 12 10.5 Q14 10.2 16 12.2 Q18 10.2 20 10.5 Q23.5 11 22.5 15.5 Q22 19.5 16 23.5Z" fill="none" stroke="#ff6bb5" stroke-width="0.8" opacity="0.8"/>
  <!-- Heart highlight -->
  <path d="M13 12.5 Q11.5 14 12 16.5 Q12.8 14.5 14.2 13.2Z" fill="#ff8fc3" opacity="0.5"/>
  <!-- Top gold bar -->
  <rect x="6" y="5" width="20" height="2.5" rx="1" fill="#f5c842" opacity="0.12"/>
  <!-- Bottom dots -->
  <circle cx="13.5" cy="27" r="0.8" fill="#f5c842" opacity="0.6"/>
  <circle cx="16" cy="27.5" r="0.8" fill="#f5c842" opacity="0.8"/>
  <circle cx="18.5" cy="27" r="0.8" fill="#f5c842" opacity="0.6"/>
