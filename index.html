<!doctype html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>재회 타로 🔮</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <button id="theme-toggle" class="btn-theme" aria-label="테마 전환">☀️</button>

  <!-- ① 웰컴 화면 -->
  <section id="screen-welcome" class="screen active">
    <div class="welcome-wrap">
      <div class="orb">🔮</div>
      <h1>그 사람과 재회할 수 있을까?</h1>
      <p class="sub">78장의 유니버셜 타로카드로<br>두 사람의 재회 가능성을 알아보세요</p>
      <p class="hint">마음속으로 그 사람을 떠올리며<br>이끌리는 카드 <strong>3장</strong>을 선택하세요</p>
      <button id="btn-start" class="btn-cta">카드 선택 시작하기 →</button>
    </div>
  </section>

  <!-- ② 카드 선택 화면 -->
  <section id="screen-select" class="screen">
    <div class="select-top">
      <button class="btn-nav" id="btn-back">← 처음으로</button>
      <span class="select-title">마음이 이끄는 카드 <strong>3장</strong>을 고르세요</span>
      <span id="sel-count" class="sel-count">0 / 3</span>
    </div>

    <div id="cards-grid" class="cards-grid"></div>

    <div class="select-footer">
      <div class="preview-row">
        <div class="preview-slot" id="prev-0"><span class="prev-empty">?</span></div>
        <div class="preview-slot" id="prev-1"><span class="prev-empty">?</span></div>
        <div class="preview-slot" id="prev-2"><span class="prev-empty">?</span></div>
      </div>
      <button id="btn-result" class="btn-cta" disabled>결과 보기 →</button>
    </div>
  </section>

  <!-- ③ 결과 화면 -->
  <section id="screen-result" class="screen">
    <div class="result-wrap">
      <div class="result-top">
        <button class="btn-nav" id="btn-restart">↺ 다시 하기</button>
        <h2>🔮 재회 타로 결과</h2>
      </div>

      <div id="result-cards" class="result-cards"></div>

      <div class="prob-box">
        <div class="prob-title">재회 확률</div>
        <div class="prob-track">
          <div id="prob-bar" class="prob-bar"></div>
        </div>
        <div id="prob-pct" class="prob-pct">0%</div>
        <div id="prob-msg" class="prob-msg"></div>
      </div>

      <div id="balance" class="balance-row"></div>

      <h3 class="sec-title">카드별 해석</h3>
      <div id="card-readings" class="card-readings"></div>

      <h3 class="sec-title">종합 해석</h3>
      <div id="overall" class="overall-box"></div>

      <div class="ai-wrap">
        <button id="btn-ai" class="btn-ai">✨ AI 타로 심층 해석 받기</button>
        <div id="ai-spinner" class="ai-spinner hidden">🔮 AI가 카드를 해석하는 중...</div>
        <div id="ai-text" class="ai-text hidden"></div>
      </div>
    </div>
  </section>

  <script type="module" src="/main.js"></script>
</body>
</html>
