<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>별명 생성기 ✨</title>
  <link href="/style.css" rel="stylesheet" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-icon">✨</div>
      <h1>별명 생성기</h1>
      <p class="subtitle">이름을 입력하면 AI가 재미있는 별명을 지어드려요!</p>
    </header>

    <div class="input-card">
      <div class="input-row">
        <input
          type="text"
          id="name-input"
          class="name-input"
          placeholder="이름을 입력하세요 (예: 민준, Sarah)"
          maxlength="20"
          autocomplete="off"
        />
        <button id="generate-btn" class="btn-generate">
          <span class="btn-text">별명 지어주기</span>
          <span class="btn-icon">→</span>
        </button>
      </div>
      <p class="input-hint">한국어, 영어 이름 모두 가능해요 🌏</p>
    </div>

    <!-- 로딩 -->
    <div id="loading" class="loading hidden">
      <div class="loading-ring"></div>
      <p id="loading-text">AI가 별명을 생각하는 중...</p>
    </div>

    <!-- 에러 -->
    <div id="error-box" class="error-box hidden">
      <span class="error-icon">⚠️</span>
      <p id="error-msg">오류가 발생했습니다.</p>
    </div>

    <!-- 결과 -->
    <div id="results" class="results hidden">
      <div class="results-header">
        <h2 id="results-title" class="results-title"></h2>
        <button id="regenerate-btn" class="btn-regen">다시 만들기 ↺</button>
      </div>
      <div id="nicknames-grid" class="nicknames-grid"></div>
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
